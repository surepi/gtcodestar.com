<!doctype html>
<html lang="{pboot:lang}">
<head>
	<meta charset="utf-8">
	<title>{pboot:pagetitle}</title>
	<meta name="keywords" content="{pboot:pagekeywords}">
	<meta name="description" content="{pboot:pagedescription}">
	<link rel="canonical" href="{label:app_host}{pboot:sitepath}/">
	{pboot:hreflang}
	<meta property="og:title" content="{pboot:pagetitle}">
	<meta property="og:description" content="{pboot:pagedescription}">
	<meta property="og:site_name" content="{pboot:companyname}">
	<meta property="og:image" content="{pboot:sitelogo}">
	<meta name="twitter:card" content="summary_large_image">
	<meta name="twitter:title" content="{pboot:pagetitle}">
	<meta name="twitter:description" content="{pboot:pagedescription}">
	<meta name="robots" content="index, follow">
	<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=5,shrink-to-fit=no">
	<link rel="shortcut icon" href="{pboot:sitepath}/favicon.ico" type="image/x-icon">
	<link rel="preconnect" href="https://r2.gtcodestar.com.cn" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
	<link rel="stylesheet" href="{pboot:sitetplpath}/css/global.css">
	<script src="{pboot:sitetplpath}/js/jquery-1.12.4.min.js"></script>
