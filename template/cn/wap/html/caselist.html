<!doctype html>
<html lang="{pboot:lang}">
<head>
	<meta charset="utf-8">
	<title>{pboot:pagetitle}</title>
	<meta name="keywords" content="{pboot:pagekeywords}">
	<meta name="description" content="{pboot:pagedescription}">
	<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=5,viewport-fit=cover">
	<link rel="canonical" href="{label:app_host}{pboot:sitepath}/">
	{pboot:hreflang}
	<meta property="og:type" content="website">
	<meta property="og:title" content="{pboot:pagetitle}">
	<meta property="og:description" content="{pboot:pagedescription}">
	<meta property="og:site_name" content="{pboot:companyname}">
	<meta property="og:image" content="{pboot:sitelogo}">
	<meta name="robots" content="index, follow">
	<meta name="format-detection" content="telephone=no">
	<link rel="shortcut icon" href="{pboot:sitepath}/favicon.ico" type="image/x-icon">
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
	<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#1d1d1f;background:#fff;overflow-x:hidden;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
body.menu-open{overflow:hidden}
a{color:inherit;text-decoration:none;transition:all .3s}
img{max-width:100%;height:auto}
h1,h2,h3{font-family:'Poppins','Inter',sans-serif}
.m-nav{position:fixed;top:0;left:0;width:100%;z-index:1000;height:56px;background:rgba(255,255,255,.92);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);box-shadow:0 1px 0 rgba(0,0,0,.06)}
.m-nav-inner{display:flex;align-items:center;justify-content:space-between;height:56px;padding:0 20px}
.m-nav-logo img{height:20px}
.m-nav-toggle{width:44px;height:44px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;background:none;border:none;cursor:pointer}
.m-nav-toggle span{display:block;width:22px;height:2px;background:#1d1d1f;border-radius:2px;transition:all .3s}
.m-nav-toggle.active span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
.m-nav-toggle.active span:nth-child(2){opacity:0}
.m-nav-toggle.active span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}
.m-menu-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,.98);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:999;opacity:0;visibility:hidden;transition:all .4s;display:flex;align-items:center;justify-content:center}
.m-menu-overlay.open{opacity:1;visibility:visible}
.m-menu-inner{text-align:center;padding:20px}
.m-menu-list{list-style:none;margin-bottom:40px}
.m-menu-list li{margin-bottom:8px}
.m-menu-list a{font-size:24px;font-weight:700;color:#1d1d1f;display:block;padding:12px 0}
.m-menu-contact{margin-top:20px}
.m-menu-phone,.m-menu-email{display:block;font-size:14px;color:#6e6e73;margin-bottom:10px}
.m-page-hero{padding:80px 20px 32px;background:#f5f5f7;text-align:center}
.m-page-hero h1{font-size:28px;font-weight:800;letter-spacing:-1px;margin-bottom:8px}
.m-page-hero p{font-size:14px;color:#6e6e73}

/* 妗堜緥缃戞牸 */
.m-case-grid{padding:20px;display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.m-case-card{background:#f5f5f7;border-radius:14px;overflow:hidden}
.m-case-card .m-case-img{aspect-ratio:4/3;overflow:hidden}
.m-case-card .m-case-img img{width:100%;height:100%;object-fit:cover}
.m-case-card .m-case-title{padding:10px 12px;font-size:13px;font-weight:600;color:#1d1d1f;text-align:center}

.m-pager{display:flex;justify-content:center;gap:6px;padding:24px 20px 40px;flex-wrap:wrap}
.m-page-btn,.m-pager a{display:inline-flex;align-items:center;justify-content:center;min-width:36px;height:36px;padding:0 12px;border-radius:100px;font-size:13px;font-weight:500;color:#6e6e73;background:#f5f5f7}
.m-pager a.page-num-current{background:#1d1d1f;color:#fff}
.m-empty{text-align:center;padding:60px 20px;color:#6e6e73;font-size:14px}
.m-footer{padding:48px 20px 100px;background:#1d1d1f;color:#fff}
.m-footer-inner{text-align:center}
.m-footer-logo{margin-bottom:24px}
.m-footer-logo img{height:16px;opacity:.7}
.m-footer-info{margin-bottom:20px}
.m-footer-info p{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:8px;line-height:1.5}
.m-footer-info p i{margin-right:6px}
.m-footer-links{display:flex;justify-content:center;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.m-footer-links a{font-size:12px;color:rgba(255,255,255,.5)}
.m-footer-social{display:flex;justify-content:center;gap:10px;margin-bottom:20px}
.m-footer-social a{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.15);border-radius:50%;color:rgba(255,255,255,.5);font-size:14px}
.m-footer-copy{font-size:11px;color:rgba(255,255,255,.2)}
.m-bottom-bar{position:fixed;bottom:0;left:0;width:100%;background:#fff;box-shadow:0 -1px 0 rgba(0,0,0,.08);display:flex;z-index:998;padding-bottom:env(safe-area-inset-bottom)}
.m-bar-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0;color:#1d1d1f;font-size:10px;min-height:50px}
.m-bar-item i{font-size:18px;margin-bottom:2px;color:#0071e3}
</style>
</head>
<body>

{include file=comm/head.html}

<section class="m-page-hero">
	<h1>{sort:name}</h1>
	<p>{sort:subname}</p>
</section>

<div class="m-case-grid">
	{pboot:list num=8 order=sorting}
	<a href="[list:link]" class="m-case-card">
		<div class="m-case-img">
			<img src="[list:ico]" alt="[list:title]" loading="lazy">
		</div>
		<div class="m-case-title">[list:title]</div>
	</a>
	{/pboot:list}
</div>

{pboot:if({page:rows}>0)}
<div class="m-pager">
	<a class="m-page-btn" href="{page:pre}">鈫?Prev</a>
	{page:numbar}
	<a class="m-page-btn" href="{page:next}">下一页 鈫?/a>
</div>
{else}
<div class="m-empty">No data</div>
{/pboot:if}

{include file=comm/foot.html}

</body>
</html>
