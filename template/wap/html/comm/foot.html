<!-- 手机端 Footer -->
<footer class="m-footer">
	<div class="m-footer-inner">
		<div class="m-footer-logo">
			<img src="{label:r2_domain}/images/logo-foot.png" alt="{pboot:companyname}" loading="lazy">
		</div>
		<div class="m-footer-info">
			<p><i class="fa fa-map-marker"></i> {pboot:companyaddress}</p>
			<p><i class="fa fa-phone"></i> {pboot:companyphone}</p>
			<p><i class="fa fa-envelope-o"></i> {pboot:companyemail}</p>
			<p><i class="fa fa-mobile"></i> {pboot:companymobile}</p>
		</div>
		<div class="m-footer-links">
			<a href="{label:app_host}/aboutus/">About Us</a>
			<a href="{label:app_host}/product/">Products</a>
			<a href="{label:app_host}/news/">News</a>
			<a href="{label:app_host}/contact/">Contact</a>
		</div>
		<div class="m-footer-social">
			<a href="#" aria-label="LinkedIn"><i class="fa fa-linkedin"></i></a>
			<a href="#" aria-label="Facebook"><i class="fa fa-facebook"></i></a>
		</div>
		<div class="m-footer-copy">{pboot:sitecopyright}</div>
	</div>
</footer>

<!-- 底部快捷栏 -->
<div class="m-bottom-bar">
	<a href="tel:{pboot:companymobile}" class="m-bar-item">
		<i class="fa fa-phone"></i>
		<span>Call</span>
	</a>
	<a href="mailto:{pboot:companyemail}" class="m-bar-item">
		<i class="fa fa-envelope-o"></i>
		<span>Email</span>
	</a>
	<a href="{label:app_host}/contact/" class="m-bar-item">
		<i class="fa fa-commenting-o"></i>
		<span>Inquiry</span>
	</a>
</div>

{pboot:sitestatistical}
