<!-- 手机端导航 -->
<nav class="m-nav" id="mNav">
	<div class="m-nav-inner">
		<a class="m-nav-logo" href="{pboot:sitepath}/">
			<img src="{pboot:sitelogo}" alt="{pboot:companyname}">
		</a>
		<button class="m-nav-toggle" id="menuToggle" aria-label="Menu">
			<span></span><span></span><span></span>
		</button>
	</div>
</nav>

<!-- 全屏菜单 -->
<div class="m-menu-overlay" id="menuOverlay">
	<div class="m-menu-inner">
		<ul class="m-menu-list">
			<li><a href="{pboot:sitepath}/">Home</a></li>
			{pboot:nav num=10 parent=0}
			<li><a href="[nav:link]">[nav:name]</a></li>
			{/pboot:nav}
		</ul>
		<div class="m-menu-contact">
			<a href="tel:{pboot:companymobile}" class="m-menu-phone"><i class="fa fa-phone"></i> {pboot:companymobile}</a>
			<a href="mailto:{pboot:companyemail}" class="m-menu-email"><i class="fa fa-envelope-o"></i> {pboot:companyemail}</a>
		</div>
	</div>
</div>

<script>
(function(){
	var toggle=document.getElementById('menuToggle');
	var overlay=document.getElementById('menuOverlay');
	var body=document.body;
	toggle.addEventListener('click',function(){
		toggle.classList.toggle('active');
		overlay.classList.toggle('open');
		body.classList.toggle('menu-open');
	});
	// 点击菜单链接关闭
	overlay.querySelectorAll('a').forEach(function(a){
		a.addEventListener('click',function(){
			toggle.classList.remove('active');
			overlay.classList.remove('open');
			body.classList.remove('menu-open');
		});
	});
})();
</script>
