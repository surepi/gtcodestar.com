<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<title>{pboot:pagetitle}</title>
	<meta name="keywords" content="{pboot:pagekeywords}">
	<meta name="description" content="{pboot:pagedescription}">
	<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=5,viewport-fit=cover">
	<link rel="canonical" href="{label:app_host}{pboot:sitepath}/">
	<meta property="og:type" content="website">
	<meta property="og:title" content="{pboot:pagetitle}">
	<meta property="og:description" content="{pboot:pagedescription}">
	<meta property="og:site_name" content="{pboot:companyname}">
	<meta property="og:image" content="{content:ico}">
	<meta name="twitter:card" content="summary_large_image">
	<meta name="twitter:title" content="{pboot:pagetitle}">
	<meta name="twitter:description" content="{pboot:pagedescription}">
	<meta name="robots" content="index, follow">
	<meta name="format-detection" content="telephone=no">
	<link rel="shortcut icon" href="{pboot:sitepath}/favicon.ico" type="image/x-icon">
	<link rel="preconnect" href="https://r2.gtcodestar.com.cn" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
	<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#1d1d1f;background:#fff;overflow-x:hidden;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
body.menu-open{overflow:hidden}
a{color:inherit;text-decoration:none;transition:all .3s}
img{max-width:100%;height:auto}
h1,h2,h3{font-family:'Poppins','Inter',sans-serif}
.m-container{padding:0 20px}

/* 导航 */
.m-nav{position:fixed;top:0;left:0;width:100%;z-index:1000;height:56px;background:rgba(255,255,255,.92);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);box-shadow:0 1px 0 rgba(0,0,0,.06)}
.m-nav-inner{display:flex;align-items:center;justify-content:space-between;height:56px;padding:0 20px}
.m-nav-logo img{height:20px}
.m-nav-toggle{width:44px;height:44px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;background:none;border:none;cursor:pointer}
.m-nav-toggle span{display:block;width:22px;height:2px;background:#1d1d1f;border-radius:2px;transition:all .3s}
.m-nav-toggle.active span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
.m-nav-toggle.active span:nth-child(2){opacity:0}
.m-nav-toggle.active span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}
.m-menu-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,.98);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:999;opacity:0;visibility:hidden;transition:all .4s;display:flex;align-items:center;justify-content:center}
.m-menu-overlay.open{opacity:1;visibility:visible}
.m-menu-inner{text-align:center;padding:20px}
.m-menu-list{list-style:none;margin-bottom:40px}
.m-menu-list li{margin-bottom:8px}
.m-menu-list a{font-size:24px;font-weight:700;color:#1d1d1f;display:block;padding:12px 0}
.m-menu-contact{margin-top:20px}
.m-menu-phone,.m-menu-email{display:block;font-size:14px;color:#6e6e73;margin-bottom:10px}

/* 面包屑 */
.m-breadcrumb{padding:64px 20px 8px;font-size:12px;color:#6e6e73;background:#f5f5f7}
.m-breadcrumb a{color:#0071e3}

/* 产品图 Swiper */
.m-gallery{position:relative;background:#f5f5f7;overflow:hidden}
.m-gallery-wrap{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.m-gallery-wrap::-webkit-scrollbar{display:none}
.m-gallery-slide{flex:0 0 100%;scroll-snap-align:start;display:flex;align-items:center;justify-content:center;min-height:300px;padding:20px}
.m-gallery-slide img{max-height:280px;max-width:100%;object-fit:contain;mix-blend-mode:multiply}
.m-gallery-dots{display:flex;justify-content:center;gap:6px;padding:12px 0;background:#f5f5f7}
.m-gallery-dots span{width:6px;height:6px;border-radius:50%;background:rgba(0,0,0,.15)}
.m-gallery-dots span.active{background:#0071e3;width:18px;border-radius:3px}

/* 产品信息 */
.m-product-info{padding:24px 20px 20px}
.m-product-info h1{font-size:24px;font-weight:800;letter-spacing:-.5px;line-height:1.2;margin-bottom:12px}
.m-product-desc{font-size:14px;line-height:1.7;color:#6e6e73;margin-bottom:20px}
.m-product-cta{display:inline-flex;align-items:center;gap:6px;padding:14px 28px;background:#0071e3;color:#fff;border-radius:100px;font-size:15px;font-weight:600;min-height:44px}

/* 产品详情内容 */
.m-product-detail{padding:32px 20px;border-top:1px solid #e5e5e5;margin-top:24px}
.m-product-detail h3{font-size:20px;font-weight:700;margin-bottom:16px}
.m-product-detail .content{font-size:14px;line-height:1.8;color:#333}
.m-product-detail .content img{border-radius:10px;margin:12px 0}
.m-product-detail .content table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px;display:block;overflow-x:auto}
.m-product-detail .content table td,.m-product-detail .content table th{padding:10px 12px;border:1px solid #e5e5e5;white-space:nowrap}
.m-product-detail .content table th{background:#f5f5f7;font-weight:600}

/* 上下篇 */
.m-prev-next{padding:20px;border-top:1px solid #e5e5e5}
.m-prev-next p{margin:0 0 10px;font-size:13px;color:#6e6e73}
.m-prev-next a{color:#0071e3;font-weight:500}

/* Footer */
.m-footer{padding:48px 20px 100px;background:#1d1d1f;color:#fff}
.m-footer-inner{text-align:center}
.m-footer-logo{margin-bottom:24px}
.m-footer-logo img{height:16px;opacity:.7}
.m-footer-info{margin-bottom:20px}
.m-footer-info p{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:8px;line-height:1.5}
.m-footer-info p i{margin-right:6px;width:14px;text-align:center}
.m-footer-links{display:flex;justify-content:center;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.m-footer-links a{font-size:12px;color:rgba(255,255,255,.5);font-weight:500}
.m-footer-social{display:flex;justify-content:center;gap:10px;margin-bottom:20px}
.m-footer-social a{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.15);border-radius:50%;color:rgba(255,255,255,.5);font-size:14px}
.m-footer-copy{font-size:11px;color:rgba(255,255,255,.2)}
.m-bottom-bar{position:fixed;bottom:0;left:0;width:100%;background:#fff;box-shadow:0 -1px 0 rgba(0,0,0,.08);display:flex;z-index:998;padding-bottom:env(safe-area-inset-bottom)}
.m-bar-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0;color:#1d1d1f;font-size:10px;min-height:50px}
.m-bar-item i{font-size:18px;margin-bottom:2px;color:#0071e3}
</style>
</head>
<body>

{include file=comm/head.html}

<!-- 面包屑 -->
<div class="m-breadcrumb">{pboot:position separator=' &gt; '}</div>

<!-- 产品图滑动 -->
<div class="m-gallery">
	<div class="m-gallery-wrap" id="galleryWrap">
		<div class="m-gallery-slide">
			<img src="{content:ico}" alt="{content:title}">
		</div>
		{pboot:pics num=10 id={content:id}}
		<div class="m-gallery-slide">
			<img src="[pics:src]" alt="[pics:title]" loading="lazy">
		</div>
		{/pboot:pics}
	</div>
	<div class="m-gallery-dots" id="galleryDots"></div>
</div>

<!-- 产品信息 -->
<div class="m-product-info">
	<h1>{content:title}</h1>
	<div class="m-product-desc">{content:ext_description}</div>
	<a class="m-product-cta" href="{label:app_host}/contact/">Get a Quote →</a>
</div>

<!-- 详情内容 -->
<div class="m-product-detail">
	<h3>Product Details</h3>
	<div class="content">{content:content}</div>
</div>

<!-- 上下篇 -->
<div class="m-prev-next">
	<p>Previous: {content:precontent}</p>
	<p>Next: {content:nextcontent}</p>
</div>

{include file=comm/foot.html}

<script>
// 图片滑动指示器
(function(){
	var wrap=document.getElementById('galleryWrap');
	var dots=document.getElementById('galleryDots');
	var slides=wrap.querySelectorAll('.m-gallery-slide');
	var count=slides.length;
	if(count<=1){dots.style.display='none';return}
	for(var i=0;i<count;i++){
		var d=document.createElement('span');
		if(i===0)d.classList.add('active');
		dots.appendChild(d);
	}
	var allDots=dots.querySelectorAll('span');
	wrap.addEventListener('scroll',function(){
		var idx=Math.round(wrap.scrollLeft/wrap.offsetWidth);
		allDots.forEach(function(d,i){d.classList.toggle('active',i===idx)});
	},{passive:true});
})();
</script>

<!-- 产品结构化数据 -->
<script type="application/ld+json">
{
  "@context":"https://schema.org",
  "@type":"Product",
  "name":"{content:title}",
  "description":"{pboot:pagedescription}",
  "image":"{content:ico}",
  "brand":{"@type":"Brand","name":"{pboot:companyname}"},
  "manufacturer":{"@type":"Organization","name":"{pboot:companyname}"}
}
</script>

</body>
</html>
