<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S3存储配置</title>
    <link href="/apps/admin/view/default/css/bootstrap.min.css" rel="stylesheet">
    <link href="/apps/admin/view/default/css/style.css" rel="stylesheet">
    <style>
        .form-group {
            margin-bottom: 20px;
        }
        .form-control {
            border-radius: 4px;
        }
        .btn-primary {
            background-color: #337ab7;
            border-color: #2e6da4;
        }
        .help-block {
            color: #737373;
            font-size: 12px;
            margin-top: 5px;
        }
        .alert {
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid transparent;
            border-radius: 4px;
        }
        .alert-info {
            background-color: #d9edf7;
            border-color: #bce8f1;
            color: #31708f;
        }
        .checkbox {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container" style="max-width: 800px; margin-top: 50px;">
        <div class="panel panel-default">
            <div class="panel-heading">
                <h3 class="panel-title">S3存储桶配置</h3>
            </div>
            <div class="panel-body">
                <div class="alert alert-info">
                    <strong>提示：</strong> 本插件支持AWS S3以及所有兼容S3 API的存储服务（如MinIO、阿里云OSS、腾讯云COS等）
                </div>
                
                <form method="post" action="{url(/plugin/s3storage/admin/Config/save)}">
                    <div class="form-group">
                        <label for="enabled">
                            <input type="checkbox" name="enabled" value="1" id="enabled" {if($config.enabled)}checked{/if}>
                            启用S3存储
                        </label>
                        <p class="help-block">勾选后将自动上传文件到S3存储桶</p>
                    </div>

                    <div class="form-group">
                        <label for="bucket">Bucket名称 <span style="color:red;">*</span></label>
                        <input type="text" class="form-control" id="bucket" name="bucket" value="{$config.bucket}" placeholder="your-bucket-name" required>
                        <p class="help-block">S3存储桶名称</p>
                    </div>

                    <div class="form-group">
                        <label for="access_key">Access Key <span style="color:red;">*</span></label>
                        <input type="text" class="form-control" id="access_key" name="access_key" value="{$config.access_key}" placeholder="AKIAIOSFODNN7EXAMPLE" required>
                        <p class="help-block">访问密钥ID</p>
                    </div>

                    <div class="form-group">
                        <label for="secret_key">Secret Key <span style="color:red;">*</span></label>
                        <input type="password" class="form-control" id="secret_key" name="secret_key" value="{$config.secret_key}" placeholder="wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY" required>
                        <p class="help-block">访问密钥</p>
                    </div>

                    <div class="form-group">
                        <label for="region">Region <span style="color:red;">*</span></label>
                        <input type="text" class="form-control" id="region" name="region" value="{$config.region}" placeholder="us-east-1" required>
                        <p class="help-block">区域代码,如: us-east-1, ap-southeast-1</p>
                    </div>

                    <div class="form-group">
                        <label for="endpoint">自定义Endpoint</label>
                        <input type="text" class="form-control" id="endpoint" name="endpoint" value="{$config.endpoint}" placeholder="https://s3.example.com">
                        <p class="help-block">自定义S3服务端点(用于MinIO、阿里云OSS等兼容服务),留空则使用AWS官方</p>
                    </div>

                    <div class="form-group">
                        <label for="use_path_style">
                            <input type="checkbox" name="use_path_style" value="1" id="use_path_style" {if($config.use_path_style)}checked{/if}>
                            使用Path Style Endpoint
                        </label>
                        <p class="help-block">某些兼容S3服务需要启用此选项(如MinIO)</p>
                    </div>

                    <div class="form-group">
                        <label for="cdn_domain">CDN域名</label>
                        <input type="text" class="form-control" id="cdn_domain" name="cdn_domain" value="{$config.cdn_domain}" placeholder="https://cdn.yourdomain.com">
                        <p class="help-block">如果配置了CDN,文件URL将使用此域名</p>
                    </div>

                    <div class="form-group">
                        <label for="upload_path">上传路径</label>
                        <input type="text" class="form-control" id="upload_path" name="upload_path" value="{$config.upload_path}" placeholder="uploads">
                        <p class="help-block">S3中的存储路径前缀</p>
                    </div>

                    <div class="form-group">
                        <label for="acl">ACL权限</label>
                        <select class="form-control" id="acl" name="acl">
                            <option value="private" {if($config.acl == 'private')}selected{/if}>私有</option>
                            <option value="public-read" {if($config.acl == 'public-read')}selected{/if}>公开读取</option>
                            <option value="public-read-write" {if($config.acl == 'public-read-write')}selected{/if}>公开读写</option>
                        </select>
                        <p class="help-block">文件访问权限</p>
                    </div>

                    <div class="form-group">
                        <button type="submit" class="btn btn-primary">保存配置</button>
                        <button type="button" class="btn btn-default" onclick="testConnection()">测试连接</button>
                        <button type="button" class="btn btn-default" onclick="history.back()">返回</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/apps/admin/view/default/js/jquery-1.12.4.min.js"></script>
    <script src="/apps/admin/view/default/js/bootstrap.min.js"></script>
    <script src="/apps/admin/view/default/js/common.js"></script>
    <script>
    function testConnection() {
        var btn = event.target;
        btn.disabled = true;
        btn.innerHTML = '测试中...';
        
        $.ajax({
            url: '{url(/plugin/s3storage/admin/Config/test)}',
            type: 'GET',
            dataType: 'json',
            success: function(response) {
                if (response.code == 1) {
                    alert('连接测试成功!');
                } else {
                    alert('连接测试失败: ' + response.data);
                }
            },
            error: function() {
                alert('测试请求失败,请检查网络');
            },
            complete: function() {
                btn.disabled = false;
                btn.innerHTML = '测试连接';
            }
        });
    }
    </script>
</body>
</html>
